<body>

  <nav class="navbar">
    <div class="navbar__inner">
      <a href="index.html" class="navbar__back" aria-label="Back to home" title="Back to Home">←</a>
      <a href="index.html" class="navbar__logo">
        <div class="navbar__logo-icon">S</div>
        Suraksha
      </a>

      <div class="navbar__links" id="navLinks">
        <a href="report.html" class="navbar__link">Report</a>
        <a href="track.html" class="navbar__link">Track</a>
        <a href="evidence.html" class="navbar__link">Evidence</a>

        <a href="route.html" class="navbar__link">Safe Route</a>

      <button class="navbar__hamburger" id="hamburger" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>

  <main class="page-content">
  <div class="container legal-page">

    <section class="page-header">
      <h1>⚖️ Legal Guidance</h1>
      <p class="subtitle">Know your rights. Select the type of incident to see applicable laws and recommended steps.</p>
    </section>

    <!-- Category selector -->
    <div class="card">
      <label class="form-label" for="incidentType">What happened?</label>
      <select id="incidentType" class="form-select" onchange="showLaws()">
        <option value="">— Select incident type —</option>
        <option value="harassment">Sexual Harassment</option>
        <option value="stalking">Stalking</option>
        <option value="assault">Physical Assault</option>
        <option value="cybercrime">Cybercrime / Online Abuse</option>
        <option value="workplace">Workplace Harassment</option>
        <option value="domestic">Domestic Violence</option>
      </select>
    </div>

    <!-- Laws output -->
    <div id="lawsSection" class="card hidden">
      <h2 id="lawsTitle"></h2>
      <div id="lawsList"></div>

      <div class="divider"></div>

      <h3>Recommended Steps</h3>
      <ol id="stepsList"></ol>

      <div class="divider"></div>

      <h3>Helplines</h3>
      <div id="helplinesList"></div>

      <div class="action-row">
        <button class="btn-primary" onclick="useInReport()">Use These Laws in My Report</button>
        <button class="btn-secondary" onclick="downloadGuidance()">Download as TextFile</button>
      </div>
    </div>

  </div>
  </main>

  <script src="js/app.js"></script>
  <script src="js/legal.js"></script>
  <script>window.GROQ_API_KEY = 'your_api_key_here';</script>
  <script src="js/legal-chatbot.js"></script>
</body>
